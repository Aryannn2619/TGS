<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard · TheGrindSociety</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Cdefs%3E%3ClinearGradient id=%27a%27 x1=%270%27 y1=%270%27 x2=%2764%27 y2=%2764%27%3E%3Cstop offset=%270%27 stop-color=%27%232F2FE4%27/%3E%3Cstop offset=%271%27 stop-color=%27%23162E93%27/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d=%27M32 3 L56 13 L56 36 Q56 50 32 61 Q8 50 8 36 L8 13 Z%27 fill=%27url(%23a)%27/%3E%3Ctext x=%2732%27 y=%2742%27 text-anchor=%27middle%27 font-family=%27sans-serif%27 font-size=%2728%27 fill=%27white%27 font-weight=%27bold%27%3EG%3C/text%3E%3C/svg%3E">
</head>
<body data-nav="dashboard">
<div class="bg-aurora"></div>
<div id="nav-slot"></div>

<section style="padding:2.5rem 1.5rem;" id="dash-root">
  <!-- rendered by JS -->
</section>

<div id="footer-slot"></div>
<script src="js/app.js"></script>
<script>
  const u = TGS.Auth.require();
  if (u) {
    const p = TGS.Profile.get();
    if (!p) { location.href = 'onboarding.html'; }
    else render();
  }

  function render() {
    const p = TGS.Profile.get();
    const u = TGS.Auth.current();
    const macros = TGS.Profile.macroSplit(p);
    const bmi = TGS.Profile.bmi(p);
    const bodyType = TGS.Profile.bodyType(p);
    const subs = TGS.Subs.all();
    const challenges = TGS.Challenges.list();

    const goalLabel = {
      'fat-loss': 'Fat Loss',
      'muscle-gain': 'Muscle Gain',
      'maintenance': 'Maintenance',
      'strength': 'Strength'
    }[p.goal] || p.goal;

    // Render AI-suggested trainers after main render
    setTimeout(() => {
      const slot = document.getElementById('ai-trainers');
      if (!slot) return;
      const suggested = TGS.Trainers.suggestForUser(p);
      const SPEC_LABEL = { 'fat-loss':'Fat Loss','muscle-gain':'Muscle Gain','hypertrophy':'Hypertrophy','strength':'Strength','yoga':'Yoga','rehab':'Rehab','women-fitness':'Women','calisthenics':'Calisthenics','nutrition':'Nutrition','mental':'Mental','running':'Running','cardio':'Cardio','hiit':'HIIT','bodybuilding':'Bodybuilding','functional':'Functional','mobility':'Mobility','men-aesthetics':'Aesthetics','powerlifting':'Powerlifting','contest-prep':'Contest Prep','endurance':'Endurance','marathon':'Marathon' };
      slot.innerHTML = suggested.slice(0, 3).map(({ t, matches }) => {
        const minP = Math.min(...Object.values(t.pricing).filter(p => p > 0));
        const matchPct = Math.min(98, 60 + matches * 15);
        return `
          <article class="trainer-card">
            <div class="photo-wrap">
              ${t.verified ? `<span class="verified-badge">✓ Verified</span>` : ''}
              <span class="price-pill">${matchPct}% match</span>
              <div class="photo" style="background-image:url('${t.photo}');"></div>
            </div>
            <div class="body">
              <h4>${t.name}</h4>
              <div class="city">${t.city} · From ₹${minP}</div>
              <div class="specs">${t.specs.slice(0,2).map(s => `<span class="tag">${SPEC_LABEL[s] || s}</span>`).join('')}</div>
              <div class="match-meter"><span style="width:${matchPct}%;"></span></div>
              <div class="rating-row"><span><span class="stars">${TGS.Trainers.stars(t.rating)}</span> ${t.rating}</span><span style="color:var(--muted);">${t.exp} yrs</span></div>
              <div class="actions"><a href="trainer-profile.html?id=${t.id}" class="btn btn-primary" style="flex:1;">View →</a></div>
            </div>
          </article>
        `;
      }).join('');
    }, 50);

    document.getElementById('dash-root').innerHTML = `
    <div class="container">
      <div data-fade style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;">
        <div>
          <div style="color:#9aa6ff;letter-spacing:0.2em;text-transform:uppercase;font-size:0.85rem;font-weight:600;">Welcome back</div>
          <h2 class="display" style="font-size:2.6rem;margin:0.3rem 0;">${u.name}</h2>
          <p style="color:var(--muted);margin:0;">Goal: ${goalLabel} · Body type: ${bodyType.charAt(0).toUpperCase() + bodyType.slice(1)} · BMI ${bmi}</p>
        </div>
        <div style="display:flex;gap:0.5rem;">
          <a href="onboarding.html" class="btn btn-ghost">Edit Profile</a>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-3" data-fade>
        <div class="glass stat-tile">
          <div class="label">Daily Calories</div>
          <div class="value">${macros.calories}<span style="font-size:1rem;color:var(--muted);"> kcal</span></div>
          <div class="delta up">▲ Custom for ${goalLabel}</div>
        </div>
        <div class="glass stat-tile">
          <div class="label">Current Weight</div>
          <div class="value">${p.weight}<span style="font-size:1rem;color:var(--muted);"> kg</span></div>
          <div class="delta">${p.height} cm · ${p.age} y</div>
        </div>
        <div class="glass stat-tile">
          <div class="label">Active Plans</div>
          <div class="value">${subs.length}<span style="font-size:1rem;color:var(--muted);"> / 7</span></div>
          <div class="delta">${challenges.length} challenge${challenges.length===1?'':'s'}</div>
        </div>
      </div>

      <!-- Macros -->
      <div class="grid grid-2" style="margin-top:1.5rem;">
        <div class="glass" style="padding:2rem;" data-fade>
          <h3 style="margin:0 0 1.2rem;">Today's Macros</h3>
          <div class="ring-wrap">
            ${ringSVG(60, '#2F2FE4', macros.protein + 'g', 'Protein')}
            ${ringSVG(75, '#6c6cff', macros.carbs + 'g', 'Carbs')}
            ${ringSVG(45, '#9aa6ff', macros.fats + 'g', 'Fats')}
          </div>
          <div style="margin-top:1.5rem;text-align:center;color:var(--muted);font-size:0.85rem;">
            Auto-calculated from TDEE & goal
          </div>
        </div>

        <div class="glass" style="padding:2rem;" data-fade>
          <h3 style="margin:0 0 1.2rem;">Weekly Workouts</h3>
          <div class="chart">
            <div class="bar" style="height:60%;" data-day="M"></div>
            <div class="bar" style="height:80%;" data-day="T"></div>
            <div class="bar" style="height:30%;" data-day="W"></div>
            <div class="bar" style="height:90%;" data-day="T"></div>
            <div class="bar" style="height:70%;" data-day="F"></div>
            <div class="bar" style="height:45%;" data-day="S"></div>
            <div class="bar" style="height:0%;" data-day="S"></div>
          </div>
          <div style="margin-top:2rem;display:flex;justify-content:space-between;color:var(--muted);font-size:0.85rem;">
            <span>5 workouts this week</span><span>4h 32min total</span>
          </div>
        </div>
      </div>

      <!-- AI Trainer Suggestion -->
      <div data-fade style="margin-top:3rem;">
        <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1rem;flex-wrap:wrap;gap:1rem;">
          <div>
            <div style="color:#9aa6ff;letter-spacing:0.2em;text-transform:uppercase;font-size:0.78rem;font-weight:600;">🤖 AI-Matched For You</div>
            <h3 class="display" style="font-size:1.6rem;margin:0.3rem 0 0;">Your Best Trainer Matches</h3>
          </div>
          <a href="trainers.html" class="btn btn-ghost" style="padding:0.5rem 1rem;font-size:0.85rem;">Browse all →</a>
        </div>
        <div class="grid grid-3" id="ai-trainers"></div>
      </div>

      <!-- Subscriptions -->
      <div data-fade style="margin-top:3rem;">
        <h3 class="display" style="font-size:1.6rem;">Your Plans</h3>
        <p style="color:var(--muted);margin:0 0 1.2rem;">Premium pillars — unlock more for personalized programs.</p>
        <div class="grid grid-3">
          ${[
            ['nutrition','Nutrition','🥗'],
            ['workout','Workout','💪'],
            ['recovery','Recovery','😴'],
            ['mental','Mental','🧠'],
            ['supplements','Supplements','💊'],
            ['tracking','Tracking','📊'],
            ['lifestyle','Lifestyle','🏃']
          ].map(([k,l,i]) => `
            <a href="sections/${k}.html" class="glass module-card">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
                <div class="module-icon">${i}</div>
                <span class="badge ${subs.includes(k)?'badge-pro':'badge-free'}">${subs.includes(k)?'PRO':'FREE'}</span>
              </div>
              <h3>${l}</h3>
              <p>${subs.includes(k) ? 'Personalized plan active.' : 'Unlock for ₹299 to personalize.'}</p>
              <span class="arrow">${subs.includes(k)?'View Plan →':'Upgrade →'}</span>
            </a>
          `).join('')}
        </div>
      </div>

      <!-- Challenges -->
      <div data-fade style="margin-top:3rem;">
        <h3 class="display" style="font-size:1.6rem;">Your Challenges</h3>
        ${challenges.length === 0 ? `
          <div class="glass" style="padding:2rem;text-align:center;color:var(--muted);">
            You haven't joined any challenges yet. <a href="index.html#challenges" style="color:#9aa6ff;">Browse challenges →</a>
          </div>
        ` : `
          <div class="glass" style="padding:1rem;">
            <table class="table">
              <thead><tr><th>Challenge</th><th>Joined</th><th>Progress</th><th></th></tr></thead>
              <tbody>
                ${challenges.map(c => {
                  const labels = {'weight-loss':'Lose 10kg in 3 Months','45-day':'45 Days Transformation','master-weights':'Master Weight Training'};
                  return `<tr>
                    <td><strong>${labels[c.id] || c.id}</strong></td>
                    <td style="color:var(--muted);">${new Date(c.joined).toLocaleDateString()}</td>
                    <td style="min-width:160px;"><div class="progress" style="margin-bottom:0;"><div class="progress-fill" style="width:${c.progress}%;"></div></div></td>
                    <td><a href="leaderboard.html" style="color:#9aa6ff;">Leaderboard →</a></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        `}
      </div>
    </div>`;
  }

  function ringSVG(percent, color, value, label) {
    const r = 42, c = 2 * Math.PI * r;
    const off = c - (c * percent / 100);
    return `<div>
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="${r}" fill="none" stroke="rgba(120,120,255,0.12)" stroke-width="9"></circle>
        <circle cx="55" cy="55" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
          stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 55 55)"
          style="filter:drop-shadow(0 0 8px ${color});transition:stroke-dashoffset 1.4s cubic-bezier(0.2,0.9,0.3,1.2);"></circle>
        <text x="55" y="60" text-anchor="middle" fill="white" font-family="Bebas Neue" font-size="22">${value}</text>
      </svg>
      <div class="ring-label">${label}</div>
    </div>`;
  }
</script>
</body>
</html>
