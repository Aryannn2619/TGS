<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login · TheGrindSociety</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Cdefs%3E%3ClinearGradient id=%27a%27 x1=%270%27 y1=%270%27 x2=%2764%27 y2=%2764%27%3E%3Cstop offset=%270%27 stop-color=%27%232F2FE4%27/%3E%3Cstop offset=%271%27 stop-color=%27%23162E93%27/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d=%27M32 3 L56 13 L56 36 Q56 50 32 61 Q8 50 8 36 L8 13 Z%27 fill=%27url(%23a)%27/%3E%3Ctext x=%2732%27 y=%2742%27 text-anchor=%27middle%27 font-family=%27sans-serif%27 font-size=%2728%27 fill=%27white%27 font-weight=%27bold%27%3EG%3C/text%3E%3C/svg%3E">
</head>
<body>
<div class="bg-aurora"></div>
<div id="nav-slot"></div>

<section style="min-height:80vh;display:grid;place-items:center;padding:3rem 1.5rem;">
  <div class="glass" style="max-width:440px;width:100%;padding:2.5rem;" data-fade>
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:2rem;margin-bottom:0.4rem;">🔐</div>
      <h2 class="display" style="font-size:2.2rem;margin:0;">Welcome Back</h2>
      <p style="color:var(--muted);margin-top:0.4rem;">Continue the grind.</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <label style="display:flex;align-items:center;gap:0.6rem;font-size:0.9rem;color:var(--muted);margin-bottom:1.5rem;cursor:pointer;">
        <input type="checkbox" name="remember" checked style="width:auto;accent-color:#2F2FE4;" />
        Stay logged in
      </label>
      <button type="submit" class="btn btn-primary" style="width:100%;">Login →</button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;color:var(--muted);font-size:0.9rem;">
      Don't have an account? <a href="signup.html" style="color:#9aa6ff;text-decoration:none;font-weight:600;">Sign up free</a>
    </div>
  </div>
</section>

<div id="footer-slot"></div>
<script src="js/app.js"></script>
<script>
  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const email = fd.get('email').trim().toLowerCase();
    const u = TGS.Auth.login(email, fd.get('password'), fd.get('remember') === 'on');
    if (!u) {
      // Demo: any new user gets auto-created on login attempt for convenience? No — strict. Show error.
      TGS.toast('No account found. Try signing up.');
      return;
    }
    TGS.toast(`Welcome back, ${u.name}!`);
    setTimeout(() => location.href = TGS.Profile.get() ? 'dashboard.html' : 'onboarding.html', 700);
  });
</script>
</body>
</html>
