<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Personalize · TheGrindSociety</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Cdefs%3E%3ClinearGradient id=%27a%27 x1=%270%27 y1=%270%27 x2=%2764%27 y2=%2764%27%3E%3Cstop offset=%270%27 stop-color=%27%232F2FE4%27/%3E%3Cstop offset=%271%27 stop-color=%27%23162E93%27/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d=%27M32 3 L56 13 L56 36 Q56 50 32 61 Q8 50 8 36 L8 13 Z%27 fill=%27url(%23a)%27/%3E%3Ctext x=%2732%27 y=%2742%27 text-anchor=%27middle%27 font-family=%27sans-serif%27 font-size=%2728%27 fill=%27white%27 font-weight=%27bold%27%3EG%3C/text%3E%3C/svg%3E">
</head>
<body>
<div class="bg-aurora"></div>
<div id="nav-slot"></div>

<section style="padding:3rem 1.5rem;">
  <div class="container" style="max-width:720px;">
    <div data-fade style="text-align:center;margin-bottom:2.5rem;">
      <div style="color:#9aa6ff;letter-spacing:0.2em;text-transform:uppercase;font-size:0.85rem;font-weight:600;">Step 1 of 1</div>
      <h2 class="display" style="font-size:3rem;margin:0.5rem 0;">Build Your Profile</h2>
      <p style="color:var(--muted);">60 seconds. We'll generate your personalized dashboard, macros, and program.</p>
    </div>

    <div class="glass" style="padding:2.5rem;" data-fade>
      <form id="profile-form">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" min="14" max="90" required placeholder="25" />
          </div>
          <div class="form-group">
            <label>Sex</label>
            <select name="sex" required>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Weight (kg)</label>
            <input type="number" name="weight" min="30" max="250" step="0.1" required placeholder="70" />
          </div>
          <div class="form-group">
            <label>Height (cm)</label>
            <input type="number" name="height" min="120" max="230" required placeholder="175" />
          </div>
        </div>
        <div class="form-group">
          <label>Primary Goal</label>
          <select name="goal" required>
            <option value="fat-loss">Fat Loss</option>
            <option value="muscle-gain">Muscle Gain</option>
            <option value="maintenance">Maintenance / Recomp</option>
            <option value="strength">Strength</option>
          </select>
        </div>
        <div class="form-group">
          <label>Experience Level</label>
          <select name="experience" required>
            <option value="beginner">Beginner — &lt; 6 months</option>
            <option value="intermediate" selected>Intermediate — 6 mo to 2 yrs</option>
            <option value="advanced">Advanced — 2+ yrs</option>
          </select>
        </div>
        <div class="form-group">
          <label>Activity Level</label>
          <select name="activity" required>
            <option value="sedentary">Sedentary (desk job, no exercise)</option>
            <option value="light">Light (1-2 workouts / week)</option>
            <option value="moderate" selected>Moderate (3-4 workouts / week)</option>
            <option value="active">Active (5-6 workouts / week)</option>
            <option value="athlete">Athlete (2x daily)</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary pulse" style="width:100%;margin-top:1rem;">Generate My Plan →</button>
      </form>
    </div>
  </div>
</section>

<div id="footer-slot"></div>
<script src="js/app.js"></script>
<script>
  // Pre-fill if exists
  const existing = TGS.Profile.get();
  if (existing) {
    Object.entries(existing).forEach(([k, v]) => {
      const f = document.querySelector(`[name="${k}"]`); if (f) f.value = v;
    });
  }

  document.getElementById('profile-form').addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const profile = {
      age: +fd.get('age'),
      sex: fd.get('sex'),
      weight: +fd.get('weight'),
      height: +fd.get('height'),
      goal: fd.get('goal'),
      experience: fd.get('experience'),
      activity: fd.get('activity'),
    };
    TGS.Profile.set(profile);
    TGS.toast('✓ Profile saved! Building your dashboard…');
    setTimeout(() => location.href = 'dashboard.html', 800);
  });
</script>
</body>
</html>
