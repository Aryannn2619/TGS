<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign Up · TheGrindSociety</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Cdefs%3E%3ClinearGradient id=%27a%27 x1=%270%27 y1=%270%27 x2=%2764%27 y2=%2764%27%3E%3Cstop offset=%270%27 stop-color=%27%232F2FE4%27/%3E%3Cstop offset=%271%27 stop-color=%27%23162E93%27/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d=%27M32 3 L56 13 L56 36 Q56 50 32 61 Q8 50 8 36 L8 13 Z%27 fill=%27url(%23a)%27/%3E%3Ctext x=%2732%27 y=%2742%27 text-anchor=%27middle%27 font-family=%27sans-serif%27 font-size=%2728%27 fill=%27white%27 font-weight=%27bold%27%3EG%3C/text%3E%3C/svg%3E">
</head>
<body>
<div class="bg-aurora"></div>
<div id="nav-slot"></div>

<section style="min-height:80vh;display:grid;place-items:center;padding:3rem 1.5rem;">
  <div class="glass" style="max-width:480px;width:100%;padding:2.5rem;" data-fade>
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:2rem;margin-bottom:0.4rem;">⚡</div>
      <h2 class="display" style="font-size:2.2rem;margin:0;">Join The Society</h2>
      <p style="color:var(--muted);margin-top:0.4rem;">Free forever. Premium plans optional.</p>
    </div>

    <form id="signup-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="Aryan Rathi" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required minlength="6" placeholder="Min 6 characters" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Create Account →</button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;color:var(--muted);font-size:0.9rem;">
      Already have an account? <a href="login.html" style="color:#9aa6ff;text-decoration:none;font-weight:600;">Login</a>
    </div>
  </div>
</section>

<div id="footer-slot"></div>
<script src="js/app.js"></script>
<script>
  document.getElementById('signup-form').addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const u = TGS.Auth.signup(fd.get('name').trim(), fd.get('email').trim().toLowerCase(), fd.get('password'));
    if (!u) {
      TGS.toast('That email is already registered.');
      return;
    }
    TGS.toast(`Welcome to TheGrindSociety, ${u.name}!`);
    setTimeout(() => location.href = 'onboarding.html', 700);
  });
</script>
</body>
</html>
